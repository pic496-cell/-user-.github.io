<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>武器数据库</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>武器数据库</h1>

<input id="search" placeholder="搜索武器">
<button onclick="searchWeapon()">搜索</button>

<h2>添加武器</h2>

<input id="name" placeholder="武器名称">
<input id="type" placeholder="武器类型">

<button onclick="addWeapon()">添加</button>

<h2>武器列表</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>名称</th>
<th>类型</th>
<th>操作</th>
</tr>
</thead>

<tbody id="weaponTable"></tbody>

</table>

<script src="script.js"></script>

</body>
</html>
