<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>武器数据库</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>武器数据库</h1>

<input id="search" placeholder="搜索武器">
<button onclick="searchWeapon()">搜索</button>

<h3>添加武器</h3>

<input id="name" placeholder="名称">
<input id="type" placeholder="类型">
<input id="damage" placeholder="伤害">
<input id="image" placeholder="图片URL">

<button onclick="addWeapon()">添加</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>名称</th>
<th>类型</th>
<th>伤害</th>
<th>操作</th>
</tr>
</thead>

<tbody id="weaponTable"></tbody>

</table>

<br>

<div id="imageViewer" onclick="closeImage()">
    <img id="weaponImage">
</div>
<script src="weapons.js"></script>

</body>
</html>
